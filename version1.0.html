<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Viquinho AI</title>

  <script src="https://js.puter.com/v2/"></script>

  <style>

    :root{
      --bg:#eef4ff;
      --chat:#ffffff;
      --header:#4d8dff;
      --header2:#2563eb;
      --text:#111827;
      --user:#4d8dff;
      --userText:#fff;
      --bot:#f5f7ff;
      --border:#dbe7ff;
      --input:#ffffff;
    }

    body.dark{
      --bg:#0b1220;
      --chat:#111827;
      --header:#111827;
      --header2:#1f2937;
      --text:#f9fafb;
      --user:#2563eb;
      --userText:#fff;
      --bot:#1c2740;
      --border:#31415f;
      --input:#182235;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Segoe UI,sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      width:100%;
      height:100vh;
      display:flex;
      flex-direction:column;
      background:var(--chat);
    }

    .header{
      height:74px;
      background:linear-gradient(135deg,var(--header),var(--header2));
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      flex-shrink:0;
    }

    .title{
      font-size:20px;
      font-weight:700;
    }

    .buttons{
      display:flex;
      gap:10px;
    }

    .icon-btn{
      width:44px;
      height:44px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.15);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s;
    }

    .icon-btn:hover{
      transform:scale(1.05);
      background:rgba(255,255,255,.22);
    }

    .icon-btn svg{
      width:22px;
      height:22px;
      fill:white;
    }

    .messages{
      flex:1;
      overflow-y:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:14px;
      background:var(--bg);
    }

    .message{
      max-width:82%;
      padding:14px 16px;
      border-radius:18px;
      line-height:1.5;
      word-break:break-word;
      white-space:pre-wrap;
      animation:fade .15s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(6px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .user{
      align-self:flex-end;
      background:var(--user);
      color:var(--userText);
      border-bottom-right-radius:6px;
    }

    .bot{
      align-self:flex-start;
      background:var(--bot);
      border:1px solid var(--border);
      border-bottom-left-radius:6px;
      color:var(--text);
    }

    .typing{
      display:none;
      background:var(--bot);
      border:1px solid var(--border);
      width:fit-content;
      padding:12px 14px;
      border-radius:16px;
      gap:6px;
    }

    .typing span{
      width:8px;
      height:8px;
      background:#7b8ba8;
      border-radius:50%;
      animation:bounce 1s infinite;
    }

    .typing span:nth-child(2){
      animation-delay:.2s;
    }

    .typing span:nth-child(3){
      animation-delay:.4s;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-5px);
      }
    }

    .input-area{
      padding:16px;
      border-top:1px solid var(--border);
      background:var(--chat);
    }

    .input-box{
      display:flex;
      gap:12px;
    }

    .input-box input{
      flex:1;
      height:58px;
      border-radius:18px;
      border:1px solid var(--border);
      outline:none;
      padding:0 18px;
      background:var(--input);
      color:var(--text);
      font-size:15px;
    }

    .send{
      width:58px;
      height:58px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#4d8dff,#2563eb);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s;
    }

    .send:hover{
      transform:scale(1.04);
    }

    .send svg{
      width:24px;
      height:24px;
      fill:white;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
      padding:20px;
    }

    .modal-box{
      width:100%;
      max-width:520px;
      background:var(--chat);
      border-radius:24px;
      padding:24px;
      color:var(--text);
    }

    .modal-box h2{
      margin-bottom:20px;
    }

    .modal-box label{
      display:block;
      margin-bottom:8px;
      margin-top:16px;
      font-weight:600;
    }

    .modal-box select,
    .modal-box textarea{
      width:100%;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      border-radius:14px;
      padding:14px;
      outline:none;
      font-size:14px;
    }

    .modal-box textarea{
      min-height:180px;
      resize:vertical;
    }

    .close{
      margin-top:20px;
      width:100%;
      height:52px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#4d8dff,#2563eb);
      color:white;
      font-size:15px;
      cursor:pointer;
    }

    .dev{
      margin-top:16px;
      opacity:.8;
      font-size:14px;
    }

  </style>
</head>

<body>

<div class="app">

  <div class="header">

    <div class="title">
      Viquinho AI
    </div>

    <div class="buttons">

      <button class="icon-btn" id="themeBtn">

        <svg id="themeIcon" viewBox="0 0 24 24">
          <path d="M12 3A9 9 0 1 0 21 12A7 7 0 0 1 12 3Z"/>
        </svg>

      </button>

      <button class="icon-btn" id="settingsBtn">

        <svg viewBox="0 0 24 24">
          <path d="M19.14,12.94A7.49,7.49 0 0,0 19.19,12A7.49,7.49 0 0,0 19.14,11.06L21.19,9.47A0.5,0.5 0 0,0 21.31,8.84L19.31,5.37A0.5,0.5 0 0,0 18.7,5.15L16.28,6.12A7.28,7.28 0 0,0 14.66,5.19L14.29,2.63A0.5,0.5 0 0,0 13.8,2H10.2A0.5,0.5 0 0,0 9.71,2.63L9.34,5.19A7.28,7.28 0 0,0 7.72,6.12L5.3,5.15A0.5,0.5 0 0,0 4.69,5.37L2.69,8.84A0.5,0.5 0 0,0 2.81,9.47L4.86,11.06A7.49,7.49 0 0,0 4.81,12A7.49,7.49 0 0,0 4.86,12.94L2.81,14.53A0.5,0.5 0 0,0 2.69,15.16L4.69,18.63A0.5,0.5 0 0,0 5.3,18.85L7.72,17.88A7.28,7.28 0 0,0 9.34,18.81L9.71,21.37A0.5,0.5 0 0,0 10.2,22H13.8A0.5,0.5 0 0,0 14.29,21.37L14.66,18.81A7.28,7.28 0 0,0 16.28,17.88L18.7,18.85A0.5,0.5 0 0,0 19.31,18.63L21.31,15.16A0.5,0.5 0 0,0 21.19,14.53L19.14,12.94ZM12,15.5A3.5,3.5 0 1,1 15.5,12A3.5,3.5 0 0,1 12,15.5Z"/>
        </svg>

      </button>

    </div>

  </div>

  <div class="messages" id="messages">

    <div class="typing" id="typing">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <div class="input-area">

    <div class="input-box">

      <input
        type="text"
        id="input"
        placeholder="Digite sua mensagem..."
      >

      <button class="send" id="sendBtn">

        <svg viewBox="0 0 24 24">
          <path d="M2 21L23 12L2 3V10L17 12L2 14V21Z"/>
        </svg>

      </button>

    </div>

  </div>

</div>

<div class="modal" id="modal">

  <div class="modal-box">

    <h2>⚙️ Configurações</h2>

    <label>Modelo IA</label>

    <select id="model">

      <option value="gpt-5.4-nano">
        GPT-5.4 Nano
      </option>

      <option value="gpt-5.3-chat">
        GPT-5.3 Chat
      </option>

      <option value="claude-sonnet-4">
        Claude Sonnet 4
      </option>

      <option value="claude-haiku-4">
        Claude Haiku 4
      </option>

      <option value="gemini-2.5-flash-lite">
        Gemini Flash Lite
      </option>

      <option value="deepseek-chat">
        DeepSeek Chat
      </option>

    </select>

    <label>Prompt</label>

    <textarea id="prompt">Você é Viquinho AI 🤖

Uma IA moderna, amigável e inteligente.

Você pode conversar sobre qualquer assunto:
programação, jogos, filmes, memes, tecnologia, internet e curiosidades.

Use emojis quando fizer sentido 😎🔥✨

Não use nenhum tipo de formatação. Não use negrito, itálico, links, tópicos, títulos, markdown ou blocos de código. Responda apenas em texto simples.

As respostas devem ser curtas, diretas e naturais.

Desenvolvedor: ViquinhoDev (Vicente Bajay)</textarea>

    <div class="dev">
      Desenvolvedor: ViquinhoDev (Vicente Bajay) v1.0
    </div>

    <button class="close" id="closeModal">
      Fechar
    </button>

  </div>

</div>

<script>

const messages =
  document.getElementById("messages");

const input =
  document.getElementById("input");

const sendBtn =
  document.getElementById("sendBtn");

const typing =
  document.getElementById("typing");

const modal =
  document.getElementById("modal");

const settingsBtn =
  document.getElementById("settingsBtn");

const closeModal =
  document.getElementById("closeModal");

const model =
  document.getElementById("model");

const prompt =
  document.getElementById("prompt");

const themeBtn =
  document.getElementById("themeBtn");

const conversation = [];


// TEMA
themeBtn.onclick = () => {

  document.body.classList.toggle("dark");

};


// MODAL
settingsBtn.onclick = () => {

  modal.style.display = "flex";

};

closeModal.onclick = () => {

  modal.style.display = "none";

};

modal.onclick = (e) => {

  if(e.target === modal){

    modal.style.display = "none";

  }

};


// MENSAGENS
function addMessage(text,type){

  const div =
    document.createElement("div");

  div.className =
    "message " +
    (type === "user"
      ? "user"
      : "bot");

  div.textContent = text;

  messages.insertBefore(
    div,
    typing
  );

  messages.scrollTop =
    messages.scrollHeight;

}


// DIGITANDO
function showTyping(){

  typing.style.display =
    "flex";

}

function hideTyping(){

  typing.style.display =
    "none";

}


// IA
async function sendMessage(){

  const text =
    input.value.trim();

  if(!text) return;

  addMessage(text,"user");

  input.value = "";

  showTyping();

  try{

    const response =
      await puter.ai.chat(

        [
          {
            role:"system",
            content:prompt.value
          },

          ...conversation,

          {
            role:"user",
            content:text
          }

        ],

        {
          model:model.value,
          stream:true
        }

      );

    hideTyping();

    const botDiv =
      document.createElement("div");

    botDiv.className =
      "message bot";

    botDiv.textContent = "";

    messages.insertBefore(
      botDiv,
      typing
    );

    let finalText = "";

    const timeout =
      setTimeout(() => {

        botDiv.textContent =
          "❌ Erro ao responder.";

      },30000);

    for await(const part of response){

      clearTimeout(timeout);

      if(part?.text){

        finalText +=
          part.text;

        botDiv.textContent =
          finalText;

        messages.scrollTop =
          messages.scrollHeight;

      }

    }

    conversation.push({
      role:"user",
      content:text
    });

    conversation.push({
      role:"assistant",
      content:finalText
    });

  }

  catch(err){

    hideTyping();

    console.error(err);

    addMessage(
      "❌ Erro da IA: " +
      err.message,
      "bot"
    );

  }

}


// EVENTOS
sendBtn.onclick =
  sendMessage;

input.addEventListener(
  "keydown",
  (e)=>{

    if(e.key === "Enter"){

      sendMessage();

    }

  }
);


// MENSAGEM INICIAL
addMessage(
  "👋 Olá! Eu sou o Viquinho AI.",
  "bot"
);

</script>

</body>
</html>
