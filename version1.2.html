<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Viquinho AI v1.2</title>

  <script src="https://js.puter.com/v2/"></script>

  <style>

    :root{
      --bg:#eef4ff;
      --chat:#ffffff;
      --header:#4d8dff;
      --header2:#2563eb;
      --text:#111827;
      --user:#4d8dff;
      --userText:#fff;
      --bot:#f5f7ff;
      --border:#dbe7ff;
      --input:#ffffff;
      --scroll:#4d8dff;
      --scrollbg:#dbe7ff;
      --card:#ffffff;
    }

    body.dark{
      --bg:#0b1220;
      --chat:#111827;
      --header:#111827;
      --header2:#1f2937;
      --text:#f9fafb;
      --user:#2563eb;
      --userText:#fff;
      --bot:#1c2740;
      --border:#31415f;
      --input:#182235;
      --scroll:#3b82f6;
      --scrollbg:#1f2937;
      --card:#162033;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Segoe UI,sans-serif;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:var(--bg);
      color:var(--text);
    }

    ::-webkit-scrollbar{
      width:10px;
    }

    ::-webkit-scrollbar-track{
      background:var(--scrollbg);
    }

    ::-webkit-scrollbar-thumb{
      background:var(--scroll);
      border-radius:999px;
    }

    body{
      scrollbar-color:var(--scroll) var(--scrollbg);
      scrollbar-width:thin;
    }

    .app{
      width:100%;
      height:100vh;
      display:flex;
      flex-direction:column;
      background:var(--chat);
    }

    .header{
      height:74px;
      background:linear-gradient(135deg,var(--header),var(--header2));
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 18px;
      flex-shrink:0;
    }

    .title{
      font-size:20px;
      font-weight:700;
    }

    .buttons{
      display:flex;
      gap:10px;
    }

    .icon-btn{
      width:44px;
      height:44px;
      border:none;
      border-radius:14px;
      background:rgba(255,255,255,.15);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s;
    }

    .icon-btn:hover{
      transform:scale(1.05);
      background:rgba(255,255,255,.22);
    }

    .icon-btn svg{
      width:22px;
      height:22px;
      fill:white;
    }

    .messages{
      flex:1;
      overflow-y:auto;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:14px;
      background:var(--bg);
    }

    .message{
      max-width:82%;
      padding:14px 16px;
      border-radius:18px;
      line-height:1.6;
      word-break:break-word;
      animation:fade .15s ease;
    }

    .message p{
      margin-bottom:10px;
    }

    .message p:last-child{
      margin-bottom:0;
    }

    .message ul,
    .message ol{
      margin-left:22px;
      margin-top:8px;
      margin-bottom:8px;
    }

    .message a{
      color:inherit;
      text-decoration:underline;
    }

    .message strong{
      font-weight:700;
    }

    .message em{
      font-style:italic;
    }

    .message code{
      background:rgba(255,255,255,.15);
      padding:2px 6px;
      border-radius:6px;
      font-family:Consolas,monospace;
    }

    .message blockquote{
      border-left:4px solid var(--border);
      padding-left:12px;
      margin:10px 0;
      opacity:.9;
    }

    .link-preview{
      margin-top:12px;
      border:1px solid var(--border);
      background:var(--card);
      border-radius:16px;
      overflow:hidden;
    }

    .link-preview a{
      display:block;
      padding:14px;
      text-decoration:none;
      color:inherit;
    }

    .link-preview-title{
      font-weight:700;
      margin-bottom:6px;
    }

    .link-preview-url{
      opacity:.7;
      font-size:13px;
      word-break:break-all;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(6px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .user{
      align-self:flex-end;
      background:var(--user);
      color:var(--userText);
      border-bottom-right-radius:6px;
    }

    .bot{
      align-self:flex-start;
      background:var(--bot);
      border:1px solid var(--border);
      border-bottom-left-radius:6px;
      color:var(--text);
    }

    .typing{
      display:none;
      background:var(--bot);
      border:1px solid var(--border);
      width:fit-content;
      padding:12px 14px;
      border-radius:16px;
      gap:6px;
    }

    .typing span{
      width:8px;
      height:8px;
      background:#7b8ba8;
      border-radius:50%;
      animation:bounce 1s infinite;
    }

    .typing span:nth-child(2){
      animation-delay:.2s;
    }

    .typing span:nth-child(3){
      animation-delay:.4s;
    }

    @keyframes bounce{
      0%,100%{
        transform:translateY(0);
      }
      50%{
        transform:translateY(-5px);
      }
    }

    .input-area{
      padding:16px;
      border-top:1px solid var(--border);
      background:var(--chat);
    }

    .input-box{
      display:flex;
      gap:12px;
    }

    .input-box input{
      flex:1;
      height:58px;
      border-radius:18px;
      border:1px solid var(--border);
      outline:none;
      padding:0 18px;
      background:var(--input);
      color:var(--text);
      font-size:15px;
    }

    .send{
      width:58px;
      height:58px;
      border:none;
      border-radius:18px;
      background:linear-gradient(135deg,#4d8dff,#2563eb);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.2s;
    }

    .send:hover{
      transform:scale(1.04);
    }

    .send svg{
      width:24px;
      height:24px;
      fill:white;
    }

    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.5);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
      padding:20px;
    }

    .modal-box{
      width:100%;
      max-width:520px;
      background:var(--chat);
      border-radius:24px;
      padding:24px;
      color:var(--text);
    }

    .modal-box h2{
      margin-bottom:20px;
    }

    .modal-box label{
      display:block;
      margin-bottom:8px;
      margin-top:16px;
      font-weight:600;
    }

    .modal-box select,
    .modal-box textarea{
      width:100%;
      border:1px solid var(--border);
      background:var(--input);
      color:var(--text);
      border-radius:14px;
      padding:14px;
      outline:none;
      font-size:14px;
    }

    .modal-box textarea{
      min-height:180px;
      resize:vertical;
    }

    .close{
      margin-top:20px;
      width:100%;
      height:52px;
      border:none;
      border-radius:14px;
      background:linear-gradient(135deg,#4d8dff,#2563eb);
      color:white;
      font-size:15px;
      cursor:pointer;
    }

    .danger{
      margin-top:12px;
      width:100%;
      height:50px;
      border:none;
      border-radius:14px;
      background:#ef4444;
      color:white;
      cursor:pointer;
      font-size:15px;
    }

    .dev{
      margin-top:16px;
      opacity:.8;
      font-size:14px;
    }

  </style>
</head>

<body>

<div class="app">

  <div class="header">

    <div class="title">
      Viquinho AI
    </div>

    <div class="buttons">

      <button class="icon-btn" id="themeBtn">

        <svg viewBox="0 0 24 24">
          <path d="M12 3A9 9 0 1 0 21 12A7 7 0 0 1 12 3Z"/>
        </svg>

      </button>

      <button class="icon-btn" id="settingsBtn">

        <svg viewBox="0 0 24 24">
          <path d="M19.14,12.94A7.49,7.49 0 0,0 19.19,12A7.49,7.49 0 0,0 19.14,11.06L21.19,9.47A0.5,0.5 0 0,0 21.31,8.84L19.31,5.37A0.5,0.5 0 0,0 18.7,5.15L16.28,6.12A7.28,7.28 0 0,0 14.66,5.19L14.29,2.63A0.5,0.5 0 0,0 13.8,2H10.2A0.5,0.5 0 0,0 9.71,2.63L9.34,5.19A7.28,7.28 0 0,0 7.72,6.12L5.3,5.15A0.5,0.5 0 0,0 4.69,5.37L2.69,8.84A0.5,0.5 0 0,0 2.81,9.47L4.86,11.06A7.49,7.49 0 0,0 4.81,12A7.49,7.49 0 0,0 4.86,12.94L2.81,14.53A0.5,0.5 0 0,0 2.69,15.16L4.69,18.63A0.5,0.5 0 0,0 5.3,18.85L7.72,17.88A7.28,7.28 0 0,0 9.34,18.81L9.71,21.37A0.5,0.5 0 0,0 10.2,22H13.8A0.5,0.5 0 0,0 14.29,21.37L14.66,18.81A7.28,7.28 0 0,0 16.28,17.88L18.7,18.85A0.5,0.5 0 0,0 19.31,18.63L21.31,15.16A0.5,0.5 0 0,0 21.19,14.53L19.14,12.94Z"/>
        </svg>

      </button>

    </div>

  </div>

  <div class="messages" id="messages">

    <div class="typing" id="typing">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>

  <div class="input-area">

    <div class="input-box">

      <input
        type="text"
        id="input"
        placeholder="Digite sua mensagem..."
      >

      <button class="send" id="sendBtn">

        <svg viewBox="0 0 24 24">
          <path d="M2 21L23 12L2 3V10L17 12L2 14V21Z"/>
        </svg>

      </button>

    </div>

  </div>

</div>

<div class="modal" id="modal">

  <div class="modal-box">

    <h2>⚙️ Configurações</h2>

    <label>Modelo IA</label>

    <select id="model">

      <option value="gpt-5.4-nano">
        GPT-5.4 Nano
      </option>

      <option value="gpt-5.3-chat">
        GPT-5.3 Chat
      </option>

      <option value="claude-sonnet-4">
        Claude Sonnet 4
      </option>

      <option value="claude-haiku-4">
        Claude Haiku 4
      </option>

      <option value="gemini-2.5-flash-lite">
        Gemini Flash Lite
      </option>

      <option value="deepseek-chat">
        DeepSeek Chat
      </option>

    </select>

    <label>Prompt</label>

    <textarea id="prompt">Você é Viquinho AI 🤖

Uma IA moderna, amigável e inteligente.

Você pode conversar sobre qualquer assunto:
programação, jogos, filmes, memes, tecnologia, internet e curiosidades.

Use markdown moderadamente.
Pode usar negrito, itálico, listas e links.
Não use blocos de código.

As respostas devem ser naturais e bonitas.

Desenvolvedor: ViquinhoDev</textarea>

    <div class="dev">
      Desenvolvedor: ViquinhoDev (Vicente Bajay) v1.2
    </div>

    <button class="close" id="closeModal">
      Fechar
    </button>

    <button class="danger" id="clearChat">
      Limpar conversa
    </button>

  </div>

</div>

<script>

const STORAGE_KEY =
  "viquinho_ai_chat_v12";

const messages =
  document.getElementById("messages");

const input =
  document.getElementById("input");

const sendBtn =
  document.getElementById("sendBtn");

const typing =
  document.getElementById("typing");

const modal =
  document.getElementById("modal");

const settingsBtn =
  document.getElementById("settingsBtn");

const closeModal =
  document.getElementById("closeModal");

const model =
  document.getElementById("model");

const prompt =
  document.getElementById("prompt");

const themeBtn =
  document.getElementById("themeBtn");

const clearChat =
  document.getElementById("clearChat");

const conversation = [];


themeBtn.onclick = () => {

  document.body.classList.toggle("dark");

};


settingsBtn.onclick = () => {

  modal.style.display = "flex";

};

closeModal.onclick = () => {

  modal.style.display = "none";

};

modal.onclick = (e) => {

  if(e.target === modal){

    modal.style.display = "none";

  }

};


function escapeHTML(text){

  return text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");

}


function markdown(text){

  text =
    escapeHTML(text);

  text =
    text.replace(/```[\s\S]*?```/g,"");

  text =
    text.replace(/^### (.*$)/gim,"<h3>$1</h3>");

  text =
    text.replace(/^## (.*$)/gim,"<h2>$1</h2>");

  text =
    text.replace(/^# (.*$)/gim,"<h1>$1</h1>");

  text =
    text.replace(/\*\*(.*?)\*\*/gim,"<strong>$1</strong>");

  text =
    text.replace(/\*(.*?)\*/gim,"<em>$1</em>");

  text =
    text.replace(/~~(.*?)~~/gim,"<del>$1</del>");

  text =
    text.replace(/`(.*?)`/gim,"<code>$1</code>");

  text =
    text.replace(/^> (.*$)/gim,"<blockquote>$1</blockquote>");

  text =
    text.replace(/^\- (.*$)/gim,"<li>$1</li>");

  text =
    text.replace(/(<li>.*<\/li>)/gims,"<ul>$1</ul>");

  text =
    text.replace(
      /(https?:\/\/[^\s]+)/gim,
      '<a href="$1" target="_blank">$1</a>'
    );

  text =
    text.replace(/\n/g,"<br>");

  return text;

}


function createLinkPreview(text){

  const urlMatch =
    text.match(/https?:\/\/[^\s]+/);

  if(!urlMatch) return "";

  const url =
    urlMatch[0];

  return `
    <div class="link-preview">
      <a href="${url}" target="_blank">
        <div class="link-preview-title">
          🔗 Abrir link
        </div>

        <div class="link-preview-url">
          ${url}
        </div>
      </a>
    </div>
  `;

}


function saveMessages(){

  localStorage.setItem(

    STORAGE_KEY,

    JSON.stringify({
      html:messages.innerHTML,
      conversation
    })

  );

}


function loadMessages(){

  const data =
    localStorage.getItem(STORAGE_KEY);

  if(!data) return;

  try{

    const parsed =
      JSON.parse(data);

    messages.innerHTML =
      parsed.html;

    messages.appendChild(typing);

    if(parsed.conversation){

      parsed.conversation.forEach(msg=>{

        conversation.push(msg);

      });

    }

  }

  catch(err){

    console.error(err);

  }

}


function addMessage(text,type){

  const div =
    document.createElement("div");

  div.className =
    "message " +
    (type === "user"
      ? "user"
      : "bot");

  if(type === "bot"){

    div.innerHTML =
      markdown(text) +
      createLinkPreview(text);

  }

  else{

    div.innerHTML =
      escapeHTML(text) +
      createLinkPreview(text);

  }

  messages.insertBefore(
    div,
    typing
  );

  messages.scrollTop =
    messages.scrollHeight;

  saveMessages();

  return div;

}


function showTyping(){

  typing.style.display =
    "flex";

}

function hideTyping(){

  typing.style.display =
    "none";

}


async function sendMessage(){

  const text =
    input.value.trim();

  if(!text) return;

  addMessage(text,"user");

  input.value = "";

  showTyping();

  try{

    const response =
      await puter.ai.chat(

        [
          {
            role:"system",
            content:prompt.value
          },

          ...conversation,

          {
            role:"user",
            content:text
          }

        ],

        {
          model:model.value,
          stream:true
        }

      );

    hideTyping();

    const botDiv =
      document.createElement("div");

    botDiv.className =
      "message bot";

    botDiv.innerHTML = "";

    messages.insertBefore(
      botDiv,
      typing
    );

    let finalText = "";

    for await(const part of response){

      if(part?.text){

        finalText +=
          part.text;

        botDiv.innerHTML =
          markdown(finalText) +
          createLinkPreview(finalText);

        messages.scrollTop =
          messages.scrollHeight;

      }

    }

    conversation.push({
      role:"user",
      content:text
    });

    conversation.push({
      role:"assistant",
      content:finalText
    });

    saveMessages();

  }

  catch(err){

    hideTyping();

    console.error(err);

    addMessage(
      "❌ Erro da IA: " +
      err.message,
      "bot"
    );

  }

}


clearChat.onclick = () => {

  localStorage.removeItem(
    STORAGE_KEY
  );

  messages.innerHTML = "";

  messages.appendChild(typing);

  conversation.length = 0;

  addMessage(
    "👋 Conversa limpa.",
    "bot"
  );

};


sendBtn.onclick =
  sendMessage;

input.addEventListener(
  "keydown",
  (e)=>{

    if(e.key === "Enter"){

      sendMessage();

    }

  }
);


loadMessages();

if(messages.children.length <= 1){

  addMessage(
    "👋 Olá! Eu sou o Viquinho AI.",
    "bot"
  );

}

</script>

</body>
</html>
